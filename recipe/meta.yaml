{% set name = "EditorConfig" %}
{% set version = "0.17.1" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | lower }}-{{ version }}.tar.gz
  sha256: 23c08b00e8e08cc3adcddb825251c497478df1dada6aefeb01e626ad37303745

build:
  number: 0
  noarch: python
  entry_points:
    - editorconfig = editorconfig.__main__:main
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python >=3.6
    - pip
  run:
    - python >=3.6

test:
  imports:
    - editorconfig
  commands:
    - pip check
    - editorconfig --help
  requires:
    - pip

about:
  home: http://editorconfig.org/
  summary: EditorConfig File Locator and Interpreter for Python
  license: CNRI-Python
  license_file: COPYING

extra:
  recipe-maintainers:
    - mitchellwood
